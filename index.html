<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mongolian IBAN Converter</title>
    <style>
        :root {
            --bg-color: #0d1b2a;
            --panel-bg: #1b263b;
            --gold-primary: #e0a96d;
            --gold-secondary: #9a7445;
            --text-light: #f4f5f7;
            --text-dim: #a3b1c6;
            --border-glow: rgba(224, 169, 109, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cinzel', 'Playfair Display', 'Segoe UI', serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(rgba(13, 27, 42, 0.85), rgba(13, 27, 42, 0.95)),
                radial-gradient(circle at 50% 50%, transparent 0%, var(--bg-color) 70%),
                linear-gradient(30deg, var(--gold-secondary) 12%, transparent 12.5%, transparent 87%, var(--gold-secondary) 87.5%, var(--gold-secondary)),
                linear-gradient(150deg, var(--gold-secondary) 12%, transparent 12.5%, transparent 87%, var(--gold-secondary) 87.5%, var(--gold-secondary)),
                linear-gradient(30deg, var(--gold-secondary) 12%, transparent 12.5%, transparent 87%, var(--gold-secondary) 87.5%, var(--gold-secondary)),
                linear-gradient(150deg, var(--gold-secondary) 12%, transparent 12.5%, transparent 87%, var(--gold-secondary) 87.5%, var(--gold-secondary)),
                linear-gradient(60deg, rgba(154,116,69,0.1) 25%, transparent 25.5%, transparent 75%, rgba(154,116,69,0.1) 75.5%, rgba(154,116,69,0.1)),
                linear-gradient(60deg, rgba(154,116,69,0.1) 25%, transparent 25.5%, transparent 75%, rgba(154,116,69,0.1) 75.5%, rgba(154,116,69,0.1));
            background-size: 100% 100%, 100% 100%, 40px 70px, 40px 70px, 40px 70px, 40px 70px, 40px 70px, 40px 70px;
            background-position: 0 0, 0 0, 0 0, 0 0, 20px 35px, 20px 35px, 0 0, 20px 35px;
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--panel-bg);
            border: 3px double var(--gold-primary);
            border-radius: 4px;
            padding: 30px 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(220,169,109,0.1);
            position: relative;
            overflow: hidden;
        }

        @media (min-width: 480px) {
            .container {
                padding: 50px;
            }
        }

        .container::before, .container::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--gold-primary);
            z-index: 1;
        }
        .container::before { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .container::after { bottom: 10px; right: 10px; border-left: none; border-top: none; }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px double var(--gold-secondary);
            padding-bottom: 20px;
        }

        header h1 {
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold-primary);
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-dim);
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @media (min-width: 480px) {
            header h1 { font-size: 2rem; letter-spacing: 4px; }
            header p { font-size: 0.9rem; letter-spacing: 2px; }
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (min-width: 768px) {
            .form-row {
                grid-template-columns: 1.2fr 1fr;
                gap: 30px;
                margin-bottom: 40px;
            }
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 0.75rem;
            color: var(--gold-primary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        select, input {
            background-color: rgba(13, 27, 42, 0.8);
            border: 1px solid var(--gold-secondary);
            color: var(--text-light);
            padding: 12px;
            font-size: 1rem;
            letter-spacing: 1px;
            border-radius: 0;
            outline: none;
            transition: all 0.3s ease;
            width: 100%;
        }

        select:focus, input:focus {
            border-color: var(--gold-primary);
            box-shadow: 0 0 10px var(--border-glow);
        }

        select option {
            background-color: var(--panel-bg);
            color: var(--text-light);
        }

        .output-section {
            background: rgba(13, 27, 42, 0.6);
            border: 1px solid var(--gold-secondary);
            padding: 20px 10px;
            position: relative;
            text-align: center;
            overflow-x: auto;
        }

        @media (min-width: 480px) {
            .output-section {
                padding: 30px;
            }
        }

        .output-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 15px;
        }

        /* Guarantees clean fluid scaling strictly on a single row */
        .iban-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: calc(3.2vw + 6px); 
            font-weight: bold;
            color: var(--text-light);
            min-height: 40px;
            display: block;
            white-space: nowrap;
            text-align: center;
            width: 100%;
            transition: color 0.3s ease;
        }

        @media (min-width: 768px) {
            .iban-display {
                font-size: 1.8rem;
                letter-spacing: 4px;
            }
        }

        .iban-display.active {
            color: var(--gold-primary);
            text-shadow: 0 0 8px rgba(224, 169, 109, 0.4);
        }

        .iban-segment {
            margin: 0 2px;
            display: inline-block;
        }

        @media (min-width: 480px) {
            .iban-segment {
                margin: 0 6px;
            }
        }
        
        .placeholder-text {
            font-family: inherit;
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: var(--text-dim);
            font-style: italic;
            white-space: normal;
            display: inline-block;
        }

        @media (min-width: 480px) {
            .placeholder-text {
                font-size: 1.1rem;
            }
        }

        /* Language Toggle Styling */
        .lang-toggle {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: transparent;
            border: none;
            color: var(--gold-primary);
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-decoration: underline;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 600;
            opacity: 0.7;
            transition: opacity 0.2s ease, color 0.2s ease;
            z-index: 10;
            padding: 5px;
        }

        .lang-toggle:hover {
            opacity: 1;
            color: var(--text-light);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1 id="mainTitle">IBAN Хөрвүүлэгч</h1>
            <p id="subTitle">Монгол Улсын Олон Улсын Банкны Дансны Дугаар Үүсгэгч</p>
        </header>

        <div class="form-row">
            <div class="input-group">
                <label id="labelBank" for="bankSelect">Санхүүгийн байгууллага сонгох</label>
                <select id="bankSelect">
                    <option id="optPlaceholder" value="" selected disabled hidden>Банк сонгоно уу...</option>
                    <option value="0005">Хаан Банк [0005]</option>
                    <option value="0004">Худалдаа Хөгжлийн Банк (ХХБ) [0004]</option>
                    <option value="0015">Голомт Банк [0015]</option>
                    <option value="0032">ХасБанк [0032]</option>
                    <option value="0034">Төрийн Банк [0034]</option>
                    <option value="0038">Богд Банк [0038]</option>
                    <option value="0039">М Банк [0039]</option>
                    <option value="0021">Ариг Банк [0021]</option>
                    <option value="0019">ТрансБанк [0019]</option>
                    <option value="0030">Капитрон Банк [0030]</option>
                    <option value="0033">Чингис Хаан Банк [0033]</option>
                    <option value="0036">Монгол Улсын Хөгжлийн Банк [0036]</option>
                </select>
            </div>

            <div class="input-group">
                <label id="labelAccount" for="accountInput">Хуучин дансны дугаар</label>
                <input type="text" id="accountInput" placeholder="Жишээ нь: 555555555" autocomplete="off">
            </div>
        </div>

        <div class="output-section">
            <div id="outputTitle" class="output-title">Үүсгэсэн Олон Улсын Банкны Дансны Дугаар (IBAN)</div>
            <div id="ibanDisplay" class="iban-display">
                <span class="placeholder-text" id="placeholderMsg">Банк сонгож, дансны дугаараа оруулна уу...</span>
            </div>
        </div>
    </div>

    <!-- Language Toggle Button -->
    <button id="langBtn" class="lang-toggle">EN</button>

    <script>
        // Localization Packages
        const translations = {
            mn: {
                mainTitle: "IBAN Хөрвүүлэгч",
                subTitle: "Монгол Улсын Олон Улсын Банкны Дансны Дугаар Үүсгэгч",
                labelBank: "Санхүүгийн байгууллага сонгох",
                optPlaceholder: "Банк сонгоно уу...",
                labelAccount: "Хуучин дансны дугаар",
                accountPlaceholder: "Жишээ нь: 555555555",
                outputTitle: "Үүсгэсэн Олон Улсын Банкны Дансны Дугаар (IBAN)",
                placeholderMsg: "Банк сонгож, дансны дугаараа оруулна уу..."
            },
            en: {
                mainTitle: "IBAN Converter Tool",
                subTitle: "Generate Mongolian International Bank Account Numbers",
                labelBank: "Select Institution",
                optPlaceholder: "Choose a bank...",
                labelAccount: "Legacy Account Number",
                accountPlaceholder: "e.g. 555555555",
                outputTitle: "Generated International Bank Account Number (IBAN)",
                placeholderMsg: "Select a bank and enter an account number..."
            }
        };

        let currentLang = "mn";

        const bankSelect = document.getElementById('bankSelect');
        const accountInput = document.getElementById('accountInput');
        const ibanDisplay = document.getElementById('ibanDisplay');
        const langBtn = document.getElementById('langBtn');

        // Dynamic Elements
        const mainTitle = document.getElementById('mainTitle');
        const subTitle = document.getElementById('subTitle');
        const labelBank = document.getElementById('labelBank');
        const optPlaceholder = document.getElementById('optPlaceholder');
        const labelAccount = document.getElementById('labelAccount');
        const outputTitle = document.getElementById('outputTitle');

        // Language Switch Logic
        langBtn.addEventListener('click', () => {
            currentLang = currentLang === "mn" ? "en" : "mn";
            langBtn.textContent = currentLang === "mn" ? "EN" : "MON";
            document.documentElement.lang = currentLang;
            
            // Apply text translations
            mainTitle.textContent = translations[currentLang].mainTitle;
            subTitle.textContent = translations[currentLang].subTitle;
            labelBank.textContent = translations[currentLang].labelBank;
            optPlaceholder.textContent = translations[currentLang].optPlaceholder;
            labelAccount.textContent = translations[currentLang].labelAccount;
            accountInput.placeholder = translations[currentLang].accountPlaceholder;
            outputTitle.textContent = translations[currentLang].outputTitle;

            // Refresh display area string state
            generateIBAN();
        });

        // Numeric parsing & update validation
        accountInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
            generateIBAN();
        });

        bankSelect.addEventListener('change', generateIBAN);

        function generateIBAN() {
            const bankCode = bankSelect.value;
            const rawAccount = accountInput.value.trim();

            if (!bankCode && !rawAccount) {
                ibanDisplay.classList.remove('active');
                ibanDisplay.innerHTML = `<span class="placeholder-text">${translations[currentLang].placeholderMsg}</span>`;
                return;
            }

            if (bankCode && !rawAccount) {
                ibanDisplay.classList.add('active');
                ibanDisplay.innerHTML = `
                    <span class="iban-segment">MNXX</span>
                    <span class="iban-segment">${bankCode}</span>
                    <span class="iban-segment">XXXX</span>
                    <span class="iban-segment">XXXX</span>
                    <span class="iban-segment">XXXX</span>
                `;
                return;
            }

            ibanDisplay.classList.add('active');
            
            const paddedAccount = rawAccount.padStart(12, '0');
            const countryCode = "MN";
            const checkDigits = calculateMod97CheckDigits(countryCode, bankCode, paddedAccount);
            const fullIban = `${countryCode}${checkDigits}${bankCode}${paddedAccount}`;
            
            const chunk1 = fullIban.substring(0, 4);
            const chunk2 = fullIban.substring(4, 8);
            const chunk3 = fullIban.substring(8, 12);
            const chunk4 = fullIban.substring(12, 16);
            const chunk5 = fullIban.substring(16, 20);

            ibanDisplay.innerHTML = `
                <span class="iban-segment">${chunk1}</span>
                <span class="iban-segment">${chunk2}</span>
                <span class="iban-segment">${chunk3}</span>
                <span class="iban-segment">${chunk4}</span>
                <span class="iban-segment">${chunk5}</span>
            `;
        }

        function calculateMod97CheckDigits(country, bank, account) {
            const rearrangedString = `${bank}${account}222300`;
            
            let remainder = 0;
            for (let i = 0; i < rearrangedString.length; i += 7) {
                const chunk = remainder.toString() + rearrangedString.substring(i, Math.min(i + 7, rearrangedString.length));
                remainder = parseInt(chunk, 10) % 97;
            }
            
            const checkValue = 98 - remainder;
            return checkValue.toString().padStart(2, '0');
        }
    </script>
</body>
</html>
