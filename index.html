<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bank of Mongolia — IBAN Registry Generation</title>
    <style>
        /* Art Deco Custom Theme */
        :root {
            --bg-color: #111612;      /* Deep obsidian green */
            --panel-color: #1a221c;   /* Charcoal teal panel */
            --gold-bright: #e5c158;   /* Metallic gold */
            --gold-muted: #af9039;    /* Muted architectural gold */
            --text-light: #f4f4f2;    /* Crisp ivory text */
            --text-dark: #8c968f;     /* Subtle tracking text */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            font-family: 'Cinzel', 'Times New Roman', serif;
            letter-spacing: 0.05em;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Architectural Frame container */
        .deco-container {
            width: 100%;
            max-width: 650px;
            background: var(--panel-color);
            border: 3px double var(--gold-bright);
            box-shadow: 0 0 30px rgba(229, 193, 88, 0.15);
            padding: 40px;
            position: relative;
            box-sizing: border-box;
        }

        /* Decorative Geometric Art Deco Corners */
        .deco-container::before {
            content: "";
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 1px solid var(--gold-muted);
            pointer-events: none;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--gold-muted);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 1.6rem;
            text-transform: uppercase;
            color: var(--gold-bright);
            margin: 0 0 10px 0;
            letter-spacing: 0.15em;
        }

        .subtitle {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-dark);
            letter-spacing: 0.2em;
        }

        /* Form Controls Setup */
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .field-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .field-group.narrow {
            flex: 0 0 45%;
        }

        label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--gold-bright);
            margin-bottom: 8px;
            letter-spacing: 0.1em;
        }

        select, input {
            background-color: #0d120e;
            color: var(--text-light);
            border: 1px solid var(--gold-muted);
            padding: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        select:focus, input:focus {
            border-color: var(--gold-bright);
            box-shadow: 0 0 8px rgba(229, 193, 88, 0.3);
        }

        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path fill='%23e5c158' d='M0 3l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 15px center;
            padding-right: 40px;
        }

        /* Account Output Box Area */
        .output-panel {
            margin-top: 40px;
            border-top: 1px dashed var(--gold-muted);
            padding-top: 30px;
            text-align: center;
        }

        .output-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-dark);
            margin-bottom: 12px;
            letter-spacing: 0.2em;
        }

        .iban-display-container {
            background: #0d120e;
            border: 1px solid var(--gold-muted);
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            position: relative;
        }

        .iban-text {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1.4rem;
            letter-spacing: 0.15em;
            color: var(--gold-bright);
            text-shadow: 0 0 5px rgba(229, 193, 88, 0.2);
        }

        .placeholder-text {
            color: #4a544d;
            font-style: italic;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="deco-container">
        <header>
            <h1>Interbank Payment Gateway</h1>
            <div class="subtitle">Mongolia Unified IBAN Registry</div>
        </header>

        <div class="form-row">
            <!-- Dropdown Menu of Mongolian Banks -->
            <div class="field-group narrow">
                <label for="bankSelect">Select Institution</label>
                <select id="bankSelect" onchange="updateIBAN()">
                    <option value="" selected disabled>— Select Bank —</option>
                    <option value="0500">Khan Bank (0500)</option>
                    <option value="0400">Trade & Dev Bank (0400)</option>
                    <option value="1500">Golomt Bank (1500)</option>
                    <option value="3200">XacBank (3200)</option>
                    <option value="3400">State Bank (3400)</option>
                    <option value="3800">Bogd Bank (3800)</option>
                    <option value="3900">M Bank (3900)</option>
                    <option value="2100">Arig Bank (2100)</option>
                    <option value="1900">TransBank (1900)</option>
                    <option value="3000">Capitron Bank (3000)</option>
                    <option value="3300">Chinggis Khaan Bank (3300)</option>
                    <option value="3600">Development Bank (3600)</option>
                    <option value="0100">Mongolbank Central (0100)</option>
                </select>
            </div>

            <!-- Legacy Account Field -->
            <div class="field-group">
                <label for="legacyAccount">Pre-IBAN Account Number</label>
                <input type="text" id="legacyAccount" placeholder="Up to 12 digits" maxlength="12" oninput="validateAndFormat(this); updateIBAN();">
            </div>
        </div>

        <!-- Live Updating IBAN Output Display -->
        <div class="output-panel">
            <div class="output-label">Calculated IBAN Assignment</div>
            <div class="iban-display-container">
                <div id="ibanOutput" class="placeholder-text">Awaiting selection or manual parameters...</div>
            </div>
        </div>
    </div>

    <script>
        // Restricts manual inputs strictly to positive numeric systems
        function validateAndFormat(input) {
            input.value = input.value.replace(/[^0-9]/g, '');
        }

        // Calculates check digits according to ISO-13616 Modulo-97 parameters
        function calculateCheckDigits(bankCode, numericAccount) {
            // MN is translated to numbers: M=22, N=23. Country tag 'MN00' becomes '222300' appended to tail.
            const bbanStr = bankCode + numericAccount;
            const fullNumericString = bbanStr + "222300";

            // Process via Mod-97 pieces due to JavaScript integer limits 
            let remainder = 0;
            for (let i = 0; i < fullNumericString.length; i++) {
                remainder = (remainder * 10 + parseInt(fullNumericString.charAt(i), 10)) % 97;
            }

            let checkDigits = 98 - remainder;
            return checkDigits < 10 ? "0" + checkDigits : checkDigits.toString();
        }

        function updateIBAN() {
            const bankSelect = document.getElementById("bankSelect");
            const legacyInput = document.getElementById("legacyAccount");
            const outputElement = document.getElementById("ibanOutput");

            const bankCode = bankSelect.value;
            const legacyAccount = legacyInput.value.trim();

            // Condition 1: Absolutely everything empty
            if (!bankCode && !legacyAccount) {
                outputElement.innerHTML = "Awaiting selection or manual parameters...";
                outputElement.className = "placeholder-text";
                return;
            }

            // Condition 2: Bank selected, but individual ledger input is incomplete
            if (bankCode && legacyAccount.length < 1) {
                outputElement.innerHTML = `MNxx — ${bankCode} — xxxx xxxx xxxx`;
                outputElement.className = "iban-text";
                return;
            }

            // Condition 3: Process the active elements dynamically
            if (bankCode && legacyAccount.length > 0) {
                // Left padding with zeros up to 12 character positions
                const paddedAccount = legacyAccount.padStart(12, '0');
                const calculatedCheck = calculateCheckDigits(bankCode, paddedAccount);
                const completeIBAN = `MN${calculatedCheck}${bankCode}${paddedAccount}`;

                // Inject structured output back to UI screen split into 4-char chunks
                outputElement.innerHTML = completeIBAN.match(/.{1,4}/g).join(' ');
                outputElement.className = "iban-text";
            }
        }
    </script>
</body>
</html>
