<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mongolian IBAN Converter</title>
    <style>
        :root {
            --bg-color: #0d1b2a;
            --panel-bg: #1b263b;
            --gold-primary: #e0a96d;
            --gold-secondary: #9a7445;
            --text-light: #f4f5f7;
            --text-dim: #a3b1c6;
            --border-glow: rgba(224, 169, 109, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cinzel', 'Playfair Display', 'Segoe UI', serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(rgba(13, 27, 42, 0.85), rgba(13, 27, 42, 0.95)),
                radial-gradient(circle at 50% 50%, transparent 0%, var(--bg-color) 70%),
                linear-gradient(30deg, var(--gold-secondary) 12%, transparent 12.5%, transparent 87%, var(--gold-secondary) 87.5%, var(--gold-secondary)),
                linear-gradient(150deg, var(--gold-secondary) 12%, transparent 12.5%, transparent 87%, var(--gold-secondary) 87.5%, var(--gold-secondary)),
                linear-gradient(30deg, var(--gold-secondary) 12%, transparent 12.5%, transparent 87%, var(--gold-secondary) 87.5%, var(--gold-secondary)),
                linear-gradient(150deg, var(--gold-secondary) 12%, transparent 12.5%, transparent 87%, var(--gold-secondary) 87.5%, var(--gold-secondary)),
                linear-gradient(60deg, rgba(154,116,69,0.1) 25%, transparent 25.5%, transparent 75%, rgba(154,116,69,0.1) 75.5%, rgba(154,116,69,0.1)),
                linear-gradient(60deg, rgba(154,116,69,0.1) 25%, transparent 25.5%, transparent 75%, rgba(154,116,69,0.1) 75.5%, rgba(154,116,69,0.1));
            background-size: 100% 100%, 100% 100%, 40px 70px, 40px 70px, 40px 70px, 40px 70px, 40px 70px, 40px 70px;
            background-position: 0 0, 0 0, 0 0, 0 0, 20px 35px, 20px 35px, 0 0, 20px 35px;
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--panel-bg);
            border: 3px double var(--gold-primary);
            border-radius: 4px;
            padding: 50px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(220,169,109,0.1);
            position: relative;
            overflow: hidden;
        }

        .container::before, .container::after {
            content: "";
            position: absolute;
            width: 30px;
            height: 30px;
            border: 2px solid var(--gold-primary);
            z-index: 1;
        }
        .container::before { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .container::after { bottom: 10px; right: 10px; border-left: none; border-top: none; }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px double var(--gold-secondary);
            padding-bottom: 20px;
        }

        header h1 {
            font-size: 2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold-primary);
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-dim);
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            color: var(--gold-primary);
            margin-bottom: 10px;
            font-weight: 600;
        }

        select, input {
            background-color: rgba(13, 27, 42, 0.8);
            border: 1px solid var(--gold-secondary);
            color: var(--text-light);
            padding: 15px;
            font-size: 1.1rem;
            letter-spacing: 1px;
            border-radius: 0;
            outline: none;
            transition: all 0.3s ease;
        }

        select:focus, input:focus {
            border-color: var(--gold-primary);
            box-shadow: 0 0 10px var(--border-glow);
        }

        select option {
            background-color: var(--panel-bg);
            color: var(--text-light);
        }

        .output-section {
            background: rgba(13, 27, 42, 0.6);
            border: 1px solid var(--gold-secondary);
            padding: 30px;
            position: relative;
            text-align: center;
        }

        .output-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-dim);
            margin-bottom: 15px;
        }

        .iban-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 4px;
            color: var(--text-light);
            min-height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: color 0.3s ease;
        }

        .iban-display.active {
            color: var(--gold-primary);
            text-shadow: 0 0 8px rgba(224, 169, 109, 0.4);
        }

        .iban-segment {
            margin: 0 6px;
        }
        
        .placeholder-text {
            font-family: inherit;
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: var(--text-dim);
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>IBAN Converter Tool</h1>
            <p>Generate Mongolian International Bank Account Numbers</p>
        </header>

        <div class="form-row">
            <div class="input-group">
                <label for="bankSelect">Select Institution</label>
                <select id="bankSelect">
                    <option value="" selected disabled hidden>Choose a bank...</option>
                    <option value="0005">Khan Bank [0005]</option>
                    <option value="0004">Trade and Development Bank (TDB) [0004]</option>
                    <option value="0015">Golomt Bank [0015]</option>
                    <option value="0032">XacBank [0032]</option>
                    <option value="0034">State Bank [0034]</option>
                    <option value="0038">Bogd Bank [0038]</option>
                    <option value="0039">M Bank [0039]</option>
                    <option value="0021">Arig Bank [0021]</option>
                    <option value="0019">TransBank [0019]</option>
                    <option value="0030">Capitron Bank [0030]</option>
                    <option value="0033">Chinggis Khaan Bank [0033]</option>
                    <option value="0036">Development Bank of Mongolia [0036]</option>
                </select>
            </div>

            <div class="input-group">
                <label for="accountInput">Legacy Account Number</label>
                <input type="text" id="accountInput" placeholder="e.g. 555555555" autocomplete="off">
            </div>
        </div>

        <div class="output-section">
            <div class="output-title">Generated International Bank Account Number (IBAN)</div>
            <div id="ibanDisplay" class="iban-display">
                <span class="placeholder-text">Select a bank and enter an account number...</span>
            </div>
        </div>
    </div>

    <script>
        const bankSelect = document.getElementById('bankSelect');
        const accountInput = document.getElementById('accountInput');
        const ibanDisplay = document.getElementById('ibanDisplay');

        accountInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
            generateIBAN();
        });

        bankSelect.addEventListener('change', generateIBAN);

        function generateIBAN() {
            const bankCode = bankSelect.value;
            const rawAccount = accountInput.value.trim();

            if (!bankCode && !rawAccount) {
                ibanDisplay.classList.remove('active');
                ibanDisplay.innerHTML = '<span class="placeholder-text">Select a bank and enter an account number...</span>';
                return;
            }

            if (bankCode && !rawAccount) {
                ibanDisplay.classList.add('active');
                ibanDisplay.innerHTML = `
                    <span class="iban-segment">MNXX</span>
                    <span class="iban-segment">${bankCode}</span>
                    <span class="iban-segment">XXXX</span>
                    <span class="iban-segment">XXXX</span>
                    <span class="iban-segment">XXXX</span>
                `;
                return;
            }

            ibanDisplay.classList.add('active');
            
            const paddedAccount = rawAccount.padStart(12, '0');
            const countryCode = "MN";
            const checkDigits = calculateMod97CheckDigits(countryCode, bankCode, paddedAccount);
            const fullIban = `${countryCode}${checkDigits}${bankCode}${paddedAccount}`;
            
            const chunk1 = fullIban.substring(0, 4);
            const chunk2 = fullIban.substring(4, 8);
            const chunk3 = fullIban.substring(8, 12);
            const chunk4 = fullIban.substring(12, 16);
            const chunk5 = fullIban.substring(16, 20);

            ibanDisplay.innerHTML = `
                <span class="iban-segment">${chunk1}</span>
                <span class="iban-segment">${chunk2}</span>
                <span class="iban-segment">${chunk3}</span>
                <span class="iban-segment">${chunk4}</span>
                <span class="iban-segment">${chunk5}</span>
            `;
        }

        function calculateMod97CheckDigits(country, bank, account) {
            const rearrangedString = `${bank}${account}222300`;
            
            let remainder = 0;
            for (let i = 0; i < rearrangedString.length; i += 7) {
                const chunk = remainder.toString() + rearrangedString.substring(i, Math.min(i + 7, rearrangedString.length));
                remainder = parseInt(chunk, 10) % 97;
            }
            
            const checkValue = 98 - remainder;
            return checkValue.toString().padStart(2, '0');
        }
    </script>
</body>
</html>
